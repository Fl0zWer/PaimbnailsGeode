name: Build Geode Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Geode CLI
        run: |
          pip install geode-sdk

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release